<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1A6DFF" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="COP Agona Ahanta" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <meta name="description" content="COP Agona Ahanta — A Place of Grace, Growth & Glory" />
  <title>{% block title %}COP Agona Ahanta{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
