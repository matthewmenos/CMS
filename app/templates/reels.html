{% extends "base.html" %}
{% block title %}Sermons — COP Agona Ahanta{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/reels.css') }}" />
{% endblock %}

{% block body %}
<div id="app-root">
  <header class="app-header">
    <div class="header-inner">
      <a href="/" class="header-brand">
        <span class="header-church-name">Sermons</span>
      </a>
      <div class="header-actions">
        <button class="hdr-btn" id="btn-theme-toggle" aria-label="Toggle theme" data-theme="light">
          <svg class="hdr-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="hdr-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-main" id="reels-main">
    <div class="reels-container" id="reels-container">
      <!-- Reels will be loaded here -->
    </div>
  </main>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/reels.js') }}" type="module"></script>
{% endblock %}
