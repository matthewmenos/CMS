{% extends "base.html" %}
{% block title %}COP Agona Ahanta{% endblock %}

{% block body %}
<div id="app-root">

  <!-- ══ SIDEBAR ══════════════════════════════════════════════════════════════ -->
  {% include "sidebar.html" %}

  <!-- ══ HEADER ══════════════════════════════════════════════════════════════ -->
  <header class="app-header" id="app-header">
    <div class="header-inner">

      <a href="/" class="header-brand" aria-label="Home">
        <img src="{{ url_for('static', filename='images/logo.png') }}"
             onerror="this.style.display='none';this.nextSibling.style.display='flex'"
             alt="" class="header-logo-img" />
        <span class="header-logo-text" style="display:none">COP Agona Ahanta</span>
        <span class="header-church-name">COP Agona Ahanta</span>
      </a>

      <div class="header-actions">
        <!-- Menu button -->
        <button class="hdr-btn" id="btn-menu" aria-label="Menu">
          <svg class="hdr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <!-- Theme toggle -->
        <button class="hdr-btn" id="btn-theme-toggle" aria-label="Toggle theme" data-theme="light">
          <svg class="hdr-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="hdr-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <!-- Notifications -->
        <button class="hdr-btn hdr-btn--notif" id="btn-notifications" aria-label="Notifications">
          <svg class="hdr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="hdr-badge" id="notif-badge" hidden>0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ══ MAIN ════════════════════════════════════════════════════════════════ -->
  <main class="app-main" id="app-main">

    <!-- Stories bar -->
    <section class="stories-section" id="stories-bar" aria-label="Stories">
      <div class="stories-scroll" id="stories-scroll">
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
      </div>
    </section>

    <!-- Feed -->
    <section id="feed" aria-label="Posts feed">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </section>

    <!-- Other views (hidden until nav click) -->
    <section id="explore-grid"  hidden aria-label="Explore"></section>
    <section id="reels-view"    hidden aria-label="Sermon videos"></section>
    <section id="give-view"     hidden aria-label="Give"></section>
    <section id="profile-view"  hidden aria-label="Profile"></section>

    <!-- Notifications panel (dropdown) -->
    <div class="notif-panel" id="notif-panel" hidden role="dialog" aria-label="Notifications"></div>

  </main>

  <!-- ══ BOTTOM NAV ══════════════════════════════════════════════════════════ -->
  <nav class="bottom-nav" id="bottom-nav" aria-label="Main navigation">

    <button class="nav-btn active" data-view="feed" aria-label="Home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>

    <button class="nav-btn" data-view="explore" aria-label="Explore">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>Explore</span>
    </button>

    <!-- New post FAB -->
    <a href="/create" class="nav-btn nav-fab" aria-label="New post">
      <span class="fab-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </span>
    </a>

    <button class="nav-btn" data-view="reels" aria-label="Sermons">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span>Sermons</span>
    </button>

    <button class="nav-btn" data-view="profile" aria-label="Profile">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </button>

  </nav>
</div><!-- /#app-root -->

<div class="modal-overlay story-overlay" id="modal-story" hidden role="dialog" aria-modal="true">
  <div class="story-viewer">
    <div class="story-prog-bar" id="story-progress-bar"></div>
    <div class="story-top-bar">
      <img class="story-av" id="sv-avatar" src="" alt="" />
      <span class="story-uname" id="sv-username"></span>
      <time class="story-ts" id="sv-time"></time>
      <button class="story-x" id="btn-story-close" aria-label="Close story">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="story-media">
      <img id="sv-image" src="" alt="" />
      <video id="sv-video" autoplay loop hidden></video>
    </div>
    <div class="story-cap" id="sv-caption"></div>
    <button class="story-nav story-nav--l" id="sv-prev" aria-label="Previous story">&#8249;</button>
    <button class="story-nav story-nav--r" id="sv-next" aria-label="Next story">&#8250;</button>
  </div>
</div>

<!-- ══ MODAL: Comments ═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-comments" hidden role="dialog" aria-modal="true" aria-label="Comments">
  <div class="modal modal--sheet modal--comments">
    <div class="modal-drag-handle"></div>
    <div class="modal-header">
      <button class="modal-close-btn" data-close-modal aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="modal-title">Comments</h2>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-input-bar">
      <img class="comment-av" id="comment-my-avatar" src="/static/images/default-avatar.svg" alt="You" />
      <input type="text" id="comment-input" class="form-input"
             placeholder="Add a comment…" maxlength="1000" />
      <button class="btn btn-primary btn-sm" id="btn-post-comment">Post</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════════════════════════════ -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- ══ JS ══════════════════════════════════════════════════════════════════ -->
<script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
{% endblock %}
