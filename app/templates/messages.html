{% extends "base.html" %}
{% block title %}Messages — COP Agona Ahanta{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/messages.css') }}" />
{% endblock %}

{% block body %}
<div id="app-root">
  <header class="app-header">
    <div class="header-inner">
      <a href="/" class="header-brand">
        <span class="header-church-name">Messages</span>
      </a>
      <div class="header-actions">
        <button class="hdr-btn" id="btn-new-message" aria-label="New message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="7" x2="12" y2="13"/><line x1="9" y2="10" x2="15" y2="10"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-main" id="messages-main">
    <div class="messages-container">
      <!-- Conversations list -->
      <div class="conversations-list" id="conversations-list">
        <div class="skeleton-card" style="height: 60px;"></div>
        <div class="skeleton-card" style="height: 60px;"></div>
        <div class="skeleton-card" style="height: 60px;"></div>
      </div>
    </div>
  </main>
</div>

<!-- New Message Modal -->
<div class="modal-overlay" id="modal-new-message" hidden>
  <div class="modal modal--sheet">
    <div class="modal-drag-handle"></div>
    <div class="modal-header">
      <button class="modal-close-btn" data-close-modal aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="modal-title">New Message</h2>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>To</label>
        <input type="text" id="message-recipient" class="form-input" placeholder="Username or group" />
      </div>
      <div class="form-group">
        <textarea id="message-body" class="form-input" placeholder="Type a message..." rows="3"></textarea>
      </div>
      <button class="btn btn-primary btn-full" id="btn-send-message">Send</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/messages.js') }}" type="module"></script>
{% endblock %}
