{% extends "base.html" %}
{% block title %}COP Agona Ahanta{% endblock %}

{% block body %}
<!-- ============================================================
     APP SHELL  (Single-Page Application shell)
     All screens are rendered by JavaScript inside #app-root.
     ============================================================ -->
<div id="app-root">

  <!-- ── HEADER ── -->
  <header class="app-header" id="app-header">
    <div class="header-inner">
      <a href="/" class="header-logo" aria-label="Home">
        <img src="{{ url_for('static', filename='images/logo.png') }}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
             alt="COP Agona Ahanta" class="logo-img" />
        <span class="logo-text" style="display:none">COP Agona Ahanta</span>
      </a>

      <div class="header-actions">
        <button class="icon-btn" id="btn-theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
          <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <button class="icon-btn" id="btn-notifications" aria-label="Notifications">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge" id="notif-badge" hidden>0</span>
        </button>

        <button class="icon-btn" aria-label="Direct messages">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── MAIN CONTENT AREA ── -->
  <main class="app-main" id="app-main">

    <!-- STORIES BAR -->
    <section class="stories-bar" id="stories-bar" aria-label="Stories">
      <div class="stories-scroll" id="stories-scroll">
        <!-- Populated by JS -->
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
        <div class="story-skeleton"></div>
      </div>
    </section>

    <!-- FEED -->
    <section class="feed" id="feed" aria-label="Post feed">
      <!-- Populated by JS -->
      <div class="post-skeleton-card"></div>
      <div class="post-skeleton-card"></div>
    </section>

    <!-- EXPLORE GRID -->
    <section class="explore-grid" id="explore-grid" hidden></section>

    <!-- REELS -->
    <section class="reels-view" id="reels-view" hidden></section>

    <!-- GIVE -->
    <section class="give-view" id="give-view" hidden></section>

    <!-- PROFILE -->
    <section class="profile-view" id="profile-view" hidden></section>

    <!-- NOTIFICATIONS PANEL -->
    <aside class="notif-panel" id="notif-panel" hidden aria-label="Notifications"></aside>
  </main>

  <!-- ── BOTTOM NAVIGATION ── -->
  <nav class="bottom-nav" id="bottom-nav" aria-label="Main navigation">
    <button class="nav-btn active" data-view="feed" aria-label="Home">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>

    <button class="nav-btn" data-view="explore" aria-label="Explore">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>Explore</span>
    </button>

    <button class="nav-btn nav-btn--post" id="btn-new-post" aria-label="New Post">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Post</span>
    </button>

    <button class="nav-btn" data-view="reels" aria-label="Sermons / Reels">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <span>Sermons</span>
    </button>

    <button class="nav-btn" data-view="give" aria-label="Give / Tithe">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      <span>Give</span>
    </button>

    <button class="nav-btn" data-view="profile" aria-label="My Profile">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </button>
  </nav>

</div><!-- /#app-root -->

<!-- ── MODALS ── -->

<!-- New Post Modal -->
<div class="modal-overlay" id="modal-new-post" hidden aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" aria-label="Close">&times;</button>
      <h2>New Post</h2>
      <button class="btn btn-primary btn-sm" id="btn-submit-post">Share</button>
    </div>
    <div class="modal-body">
      <div class="upload-drop-zone" id="post-drop-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="upload-icon">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Tap to select a photo or video</p>
        <input type="file" id="post-file-input" accept="image/*,video/*" hidden />
      </div>
      <div class="upload-preview" id="post-preview" hidden>
        <img id="post-preview-img" alt="Preview" />
        <video id="post-preview-vid" controls hidden></video>
        <button class="btn btn-ghost btn-sm" id="btn-change-media">Change</button>
      </div>
      <div class="upload-progress" id="upload-progress" hidden>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span id="progress-label">Uploading…</span>
      </div>
      <div class="post-form" id="post-form" hidden>
        <textarea id="post-caption" placeholder="Write a caption…" rows="3" maxlength="2200"></textarea>
        <input type="text" id="post-location" placeholder="Add location" maxlength="100" />
        <select id="post-type">
          <option value="image">Photo</option>
          <option value="video">Video</option>
          <option value="reel">Short Sermon</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Story Viewer Modal -->
<div class="modal-overlay story-overlay" id="modal-story" hidden aria-modal="true" role="dialog">
  <div class="story-viewer">
    <div class="story-progress-bar" id="story-progress-bar"></div>
    <div class="story-header">
      <img class="story-avatar-lg" id="sv-avatar" src="" alt="" />
      <span class="story-username" id="sv-username"></span>
      <span class="story-time" id="sv-time"></span>
      <button class="story-close" id="btn-story-close">&times;</button>
    </div>
    <div class="story-media-container">
      <img id="sv-image" src="" alt="" />
      <video id="sv-video" autoplay muted loop hidden></video>
    </div>
    <div class="story-caption" id="sv-caption"></div>
    <button class="story-nav story-nav--prev" id="sv-prev">&#8249;</button>
    <button class="story-nav story-nav--next" id="sv-next">&#8250;</button>
  </div>
</div>

<!-- Comments Modal -->
<div class="modal-overlay" id="modal-comments" hidden aria-modal="true" role="dialog">
  <div class="modal modal--bottom">
    <div class="modal-header">
      <button class="modal-close" aria-label="Close">&times;</button>
      <h2>Comments</h2>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-input-bar">
      <img class="comment-avatar-sm" id="comment-my-avatar" src="" alt="You" />
      <input type="text" id="comment-input" placeholder="Add a comment…" maxlength="1000" />
      <button class="btn btn-primary btn-sm" id="btn-post-comment">Post</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast" aria-live="polite"></div>

<!-- Main JS -->
<script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
{% endblock %}
