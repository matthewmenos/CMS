{% extends "base.html" %}
{% block title %}Sign In — COP Agona Ahanta{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="/static/css/auth.css" />{% endblock %}

{% block body %}

<!-- If already logged in, go straight to feed -->
<script>
  if (localStorage.getItem('access_token')) {
    window.location.replace('/feed');
  }
</script>

<div class="auth-root">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="/static/icons/logo.png" alt="COP Agona Ahanta" class="auth-logo"
           onerror="this.style.display='none'" />
      <h1 class="auth-church-name">COP Agona Ahanta</h1>
      <p class="auth-tagline">A Place of Grace, Growth &amp; Glory</p>
    </div>

    <div class="auth-error" id="authError" role="alert" style="display:none"></div>

    <form class="auth-form" id="loginForm" novalidate>
      <div class="form-field">
        <input type="email" id="email" name="email" class="form-input"
               placeholder="Email address" autocomplete="email" required />
      </div>
      <div class="form-field">
        <div class="password-wrap">
          <input type="password" id="password" name="password" class="form-input"
                 placeholder="Password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary btn-full" id="loginBtn">
        <span class="btn-text">Log In</span>
        <span class="btn-spinner" hidden></span>
      </button>
    </form>

    <div class="auth-divider"><span>OR</span></div>
    <p class="auth-switch">
      Don't have an account? <a href="/auth/signup">Sign up</a>
    </p>
  </div>
</div>

<script>
(function () {
  'use strict';

  var form   = document.getElementById('loginForm');
  var btn    = document.getElementById('loginBtn');
  var errBox = document.getElementById('authError');

  // Toggle password visibility
  document.querySelector('.toggle-pw').addEventListener('click', function () {
    var pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();

    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    // Loading state
    btn.disabled = true;
    btn.querySelector('.btn-text').hidden = true;
    btn.querySelector('.btn-spinner').hidden = false;

    try {
      var res  = await fetch('/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: email, password: password }),
      });

      var data = await res.json();

      if (res.ok && data.access_token) {
        // Persist credentials
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user || {}));
        // Replace history entry so Back doesn't return to login
        window.location.replace('/feed');
      } else {
        showError(data.error || 'Login failed. Please try again.');
      }

    } catch (err) {
      showError('Network error. Please check your connection and try again.');
    } finally {
      btn.disabled = false;
      btn.querySelector('.btn-text').hidden = false;
      btn.querySelector('.btn-spinner').hidden = true;
    }
  });

  function showError(msg) {
    errBox.textContent = msg;
    errBox.style.display = 'block';
  }
  function hideError() {
    errBox.style.display = 'none';
    errBox.textContent = '';
  }
})();
</script>
{% endblock %}
