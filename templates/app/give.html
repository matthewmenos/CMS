{% extends "base.html" %}
{% block title %}Give — COP Agona Ahanta{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="/static/css/app.css" />{% endblock %}
{% block body %}
<div class="app-shell">
  <header class="app-header">
    <div class="header-left">
      <img src="/static/icons/logo.png" alt="Logo" class="header-logo" onerror="this.style.display=none" />
      <span class="header-title">Give</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggleBtn" aria-label="Toggle theme">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
        </svg>
      </button>
    </div>
  </header>
  <main class="app-main" style="display:flex;align-items:center;justify-content:center;padding:64px 24px;text-align:center">
    <div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:12px">Give</h2>
      <p style="color:var(--text-secondary);font-size:14px">This section is being built. Check back soon!</p>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="/feed" class="nav-item" aria-label="Home"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a href="/search" class="nav-item" aria-label="Search"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Search</span></a>
    <a href="/reels" class="nav-item" aria-label="Reels"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/></svg><span>Reels</span></a>
    <a href="/give" class="nav-item" aria-label="Give"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Give</span></a>
    <a href="/profile" class="nav-item" aria-label="Profile"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
  </nav>
</div>
<script>
  window.APP_CONFIG={churchSlug:"{{ config.CHURCH_SLUG }}",token:localStorage.getItem("access_token")};
  if(!window.APP_CONFIG.token)window.location.href="/auth/login";
  document.querySelector(".nav-item[href="/give"]")?.classList.add("active");
</script>
<script src="/static/js/app.js" defer></script>
{% endblock %}
